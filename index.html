<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Johnny Boi</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="icon1.png">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: "Comic Sans MS", cursive, sans-serif;
        }

        .textbox {
            background-color: red;
            color: white;
            padding: 50px 100px;
            font-size: 64px;
            font-weight: bold;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.8);
            margin-bottom: 30px;
        }

        .mute-btn {
            width: 100px;
            height: 100px;
            border: none;
            background: none;
            cursor: pointer;
        }

        .mute-btn img {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="textbox">JOHNNY BOI</div>

    <button class="mute-btn" id="muteBtn">
        <img src="icon1.png" alt="Toggle Sound">
    </button>

    <audio id="bg-audio" loop>
        <source src="sound.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById("bg-audio");
        const btn = document.getElementById("muteBtn");

        let started = false;

        btn.addEventListener("click", () => {
            // First click: start audio
            if (!started) {
                audio.play().then(() => {
                    audio.muted = false;
                    started = true;
                    console.log("Audio started 🔊");
                }).catch(err => {
                    console.error("Audio failed:", err);
                });
            } else {
                // Toggle mute after started
                audio.muted = !audio.muted;
                console.log(audio.muted ? "Muted 🔇" : "Unmuted 🔊");
            }
        });
    </script>

</body>
</html>
